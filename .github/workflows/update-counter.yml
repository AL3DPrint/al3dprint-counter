name: Update Counter

on:
  repository_dispatch:
    types: [increment-counter]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Read counter
        id: read
        run: |
          count=$(jq '.visits' counter.json)
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Increment counter
        run: |
          new_count=$(( ${{ steps.read.outputs.count }} + 1 ))
          echo "{ \"visits\": $new_count }" > counter.json

      - name: Commit changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add counter.json
          git commit -m "Increment counter"
          git push
