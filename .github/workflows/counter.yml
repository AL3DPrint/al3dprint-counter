name: Increment counter

on:
  repository_dispatch:
    types: [increment-counter]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure counter.json exists and increment
        run: |
          if [ ! -f counter.json ]; then
            echo '{ "visits": 0 }' > counter.json
          fi
          python - << 'EOF'
import json, pathlib
p = pathlib.Path("counter.json")
data = json.loads(p.read_text(encoding="utf-8"))
data["visits"] = int(data.get("visits", 0)) + 1
p.write_text(json.dumps(data), encoding="utf-8")
EOF

      - name: Commit and push
        run: |
          git config --global user.name "counter-bot"
          git config --global user.email "counter@github.com"
          git add counter.json
          git diff --cached --quiet && exit 0
          git commit -m "Increment counter"
          git push
