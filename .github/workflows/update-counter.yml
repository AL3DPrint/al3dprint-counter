name: Update Counter

on:
  repository_dispatch:
    types: [increment-counter]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read counter
        id: read
        run: |
          count=$(cat counter.json | grep -o '[0-9]\+')
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Increment counter
        run: |
          new_count=$(( ${{ steps.read.outputs.count }} + 1 ))
          echo "{ \"visits\": $new_count }" > counter.json

      - name: Commit changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add counter.json
          git commit -m "Increment counter" || echo "No changes to commit"

      - name: Push changes
        run: |
          git push
